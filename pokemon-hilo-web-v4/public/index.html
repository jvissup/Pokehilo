<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Hi-Lo • Host</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <div>
          <div class="title">Pokémon Hi‑Lo</div>
          <div class="subtitle">Host view • prices visible • start/announce games • logs • EV tools</div>
        </div>
        <div class="headerRight">
          <button class="ghost" id="openPlayerBtn">Open player</button>
          <button class="ghost" id="startBtn">Start & announce</button>
        </div>
      </header>

      <main class="main">
        <section class="cardArea">
          <div class="cardFrame">
            <img id="cardImg" alt="Card image" />
            <div class="cardMeta">
              <div class="cardTitle" id="cardTitle">—</div>
              <div class="cardSet" id="cardSet">—</div>
            </div>
          </div>

          <div class="nextCardFrame" id="nextCardFrame" aria-hidden="true">
            <div class="nextLabel">Session</div>
            <div class="hostBig" id="sessionIdText">—</div>
            <div class="hostSmall" id="sessionMeta">Not started</div>
          </div>
        </section>

        <section class="ui">
          <div class="prompt" id="prompt">Ready</div>
          <div class="status" id="status">Hit “Start & announce” to push a game to the Player tab (or let the player start locally).</div>

            <div class="panel">
            <div class="panelTitle">Live prices (CAD)</div>
            <div class="kv">
              <div class="k">Previous</div>
              <div class="v" id="hostPrev">—</div>
            </div>
            <div class="kv">
              <div class="k">Current</div>
              <div class="v" id="hostCurrent">—</div>
            </div>
            <div class="kv">
              <div class="k">Correct</div>
              <div class="v" id="hostCorrect">—</div>
            </div>
            <div class="kv">
              <div class="k">Previous title</div>
              <div class="v" id="hostPrevTitle">—</div>
            </div>
            <div class="kv">
              <div class="k">Deck remaining</div>
              <div class="v" id="hostDeck">—</div>
            </div>
          </div>
        </section>
      </main>


    </div>

    <script src="/host.js" type="module"></script>
  </body>
</html>
